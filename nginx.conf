worker_processes auto;

events {
    worker_connections 10240;
}

http {
    merge_slashes off;
    client_max_body_size 0;

    # ==========================================
    # UPSTREAM CONNECTION POOLING (LOWER PING)
    # ==========================================
    upstream node1_ws { server 193.168.199.132:80; keepalive 32; }
    upstream node2_ws { server 185.255.179.50:80;  keepalive 32; }
    upstream node3_ws { server 94.156.236.129:80;  keepalive 32; }
    upstream node4_ws { server 31.169.126.56:80;   keepalive 32; }
    upstream node5_ws { server 103.231.75.102:80;  keepalive 32; }
    upstream node6_ws { server 144.124.251.158:80; keepalive 32; }
    upstream node7_ws { server 23.81.33.87:80;     keepalive 32; }

    server {
        listen 8080;

        # ==========================================
        # WEBSOCKET ROUTING
        # ==========================================
        location /node-1 {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^.*$ / break;
            proxy_pass http://node1_ws;
        }
        
        location /node-2 {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^.*$ / break;
            proxy_pass http://node2_ws;
        }
        
        location /node-3 {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^.*$ / break;
            proxy_pass http://node3_ws;
        }
        
        location /node-4 {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^.*$ / break;
            proxy_pass http://node4_ws;
        }

        location /node-5 {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^.*$ / break;
            proxy_pass http://node5_ws;
        }

        location /node-6 {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^.*$ / break;
            proxy_pass http://node6_ws;
        }

        location /node-7 {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^.*$ / break;
            proxy_pass http://node7_ws;
        }

        # ==========================================
        # ACTIVE CAMOUFLAGE
        # ==========================================
        location / {
            proxy_pass https://www.wikipedia.org;
            proxy_ssl_server_name on;
            proxy_set_header Host www.wikipedia.org;
        }
    }
}
